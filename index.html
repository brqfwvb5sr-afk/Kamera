<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finger zählen</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; margin: 0; }
    video, canvas { width: 100%; max-width: 500px; border-radius: 12px; margin-top: 10px; }
    button { padding: 12px 18px; font-size: 18px; margin-top: 20px; border-radius: 10px; border: none; }
    #count { font-size: 32px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Fingerzähler</h1>
  <button id="startBtn">Kamera starten</button>
  <div id="count">Finger: 0</div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script type="module">
    import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const countEl = document.getElementById("count");
    const startBtn = document.getElementById("startBtn");

    let handLandmarker;
    let running = false;

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        numHands: 1,
        runningMode: "VIDEO"
      });
    }

    function countFingers(landmarks) {
      let count = 0;

      // Daumen grob
      if (landmarks[4].x < landmarks[3].x) count++;

      // Zeigefinger bis kleiner Finger
      if (landmarks[8].y < landmarks[6].y) count++;
      if (landmarks[12].y < landmarks[10].y) count++;
      if (landmarks[16].y < landmarks[14].y) count++;
      if (landmarks[20].y < landmarks[18].y) count++;

      return count;
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        running = true;
        requestAnimationFrame(loop);
      };
    }

    async function loop() {
      if (!running) return;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const now = performance.now();
      const results = handLandmarker.detectForVideo(video, now);

      let fingerCount = 0;

      if (results.landmarks && results.landmarks.length > 0) {
        const landmarks = results.landmarks[0];
        fingerCount = countFingers(landmarks);

        for (const point of landmarks) {
          ctx.beginPath();
          ctx.arc(point.x * canvas.width, point.y * canvas.height, 5, 0, 2 * Math.PI);
          ctx.fillStyle = "lime";
          ctx.fill();
        }
      }

      countEl.textContent = "Finger: " + fingerCount;
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener("click", async () => {
      await setupHandLandmarker();
      await startCamera();
    });
  </script>
</body>
</html>
