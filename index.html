<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamera 2 – Personen erkennen</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-2: rgba(31, 41, 55, 0.92);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --good: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #162033 0%, var(--bg) 60%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      backdrop-filter: blur(12px);
    }

    .status-wrap {
      display: grid;
      gap: 2px;
    }

    .status-label {
      font-size: 13px;
      color: var(--muted);
    }

    .status-name {
      font-size: 28px;
      font-weight: 700;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .floating-info {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      z-index: 3;
      pointer-events: none;
    }

    .badge {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      color: var(--text);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, input {
      border: none;
      border-radius: 14px;
      font-size: 16px;
      padding: 12px 14px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      background: var(--panel-2);
    }

    .primary { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
    .good { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .danger { background: linear-gradient(135deg, #dc2626, #f97316); }
    .ghost { background: rgba(30, 41, 59, 0.88); }

    .message {
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: var(--muted);
    }

    dialog {
      width: min(92vw, 440px);
      border: none;
      border-radius: 22px;
      padding: 0;
      background: #111827;
      color: var(--text);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }

    .modal {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 24px;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    input {
      width: 100%;
      background: #1f2937;
      color: var(--text);
      outline: 1px solid rgba(255,255,255,0.08);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .people-list {
      display: grid;
      gap: 8px;
    }

    .person-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: #1f2937;
      border-radius: 14px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="status-wrap">
        <div class="status-label">Erkannt</div>
        <div class="status-name" id="recognizedName">Niemand</div>
      </div>
      <div class="actions">
        <button id="startBtn" class="primary">Kamera starten</button>
        <button id="newUserBtn" class="good" disabled>Neuer Nutzer</button>
      </div>
    </div>

    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div class="floating-info">
        <div class="badge" id="confidenceBadge">Treffer: 0%</div>
        <div class="badge" id="savedBadge">Gespeichert: 0</div>
      </div>
    </div>

    <div class="message" id="message">Noch nicht gestartet.</div>
  </div>

  <dialog id="newUserDialog">
    <div class="modal">
      <h2>Neuer Nutzer</h2>
      <p>Gib einen Namen ein und scanne die Person. Die Daten bleiben nur lokal im Browser gespeichert.</p>
      <input id="nameInput" type="text" maxlength="24" placeholder="Name eingeben, z. B. Alexandre" />
      <div class="modal-actions">
        <button id="scanBtn" class="good">Scannen</button>
        <button id="closeDialogBtn" class="ghost">Schliessen</button>
        <button id="clearBtn" class="danger">Alle löschen</button>
      </div>
      <div>
        <div class="small" style="margin-bottom:8px;">Gespeicherte Nutzer</div>
        <div class="people-list" id="peopleList"></div>
      </div>
    </div>
  </dialog>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');

    const startBtn = document.getElementById('startBtn');
    const newUserBtn = document.getElementById('newUserBtn');
    const newUserDialog = document.getElementById('newUserDialog');
    const closeDialogBtn = document.getElementById('closeDialogBtn');
    const scanBtn = document.getElementById('scanBtn');
    const clearBtn = document.getElementById('clearBtn');
    const nameInput = document.getElementById('nameInput');
    const messageEl = document.getElementById('message');
    const recognizedNameEl = document.getElementById('recognizedName');
    const confidenceBadge = document.getElementById('confidenceBadge');
    const savedBadge = document.getElementById('savedBadge');
    const peopleListEl = document.getElementById('peopleList');

    const STORAGE_KEY = 'kamera2-face-profiles-v1';
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    const MATCH_THRESHOLD = 0.47;
    const SCAN_SAMPLES = 7;

    let modelsReady = false;
    let running = false;
    let profiles = loadProfiles();
    let lastSpokenName = '';
    let lastSpeakTime = 0;

    updatePeopleList();
    updateSavedCount();

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function loadProfiles() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function saveProfiles() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
      updatePeopleList();
      updateSavedCount();
    }

    function updateSavedCount() {
      savedBadge.textContent = 'Gespeichert: ' + profiles.length;
    }

    function updatePeopleList() {
      peopleListEl.innerHTML = '';
      if (!profiles.length) {
        peopleListEl.innerHTML = '<div class="small">Noch keine Nutzer gespeichert.</div>';
        return;
      }

      profiles.forEach((profile, index) => {
        const row = document.createElement('div');
        row.className = 'person-row';
        row.innerHTML = `
          <div>
            <div><strong>${escapeHtml(profile.name)}</strong></div>
            <div class="small">${profile.samples} Scans</div>
          </div>
          <button data-index="${index}" class="ghost">Löschen</button>
        `;
        row.querySelector('button').addEventListener('click', () => {
          profiles.splice(index, 1);
          saveProfiles();
          setMessage(profile.name + ' wurde gelöscht.');
        });
        peopleListEl.appendChild(row);
      });
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadModels() {
      setMessage('Modelle werden geladen...');
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      modelsReady = true;
      setMessage('Modelle geladen. Du kannst die Kamera starten.');
    }

    async function startCamera() {
      if (!modelsReady) await loadModels();

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      running = true;
      newUserBtn.disabled = false;
      setMessage('Kamera läuft.');
      requestAnimationFrame(recognitionLoop);
    }

    function averageDescriptors(descriptors) {
      const length = descriptors[0].length;
      const avg = new Float32Array(length);
      for (const desc of descriptors) {
        for (let i = 0; i < length; i++) avg[i] += desc[i];
      }
      for (let i = 0; i < length; i++) avg[i] /= descriptors.length;
      return Array.from(avg);
    }

    function distance(a, b) {
      let sum = 0;
      for (let i = 0; i < a.length; i++) {
        const d = a[i] - b[i];
        sum += d * d;
      }
      return Math.sqrt(sum);
    }

    function findBestMatch(descriptor) {
      if (!profiles.length) return null;
      let best = null;
      for (const profile of profiles) {
        const dist = distance(descriptor, profile.descriptor);
        if (!best || dist < best.dist) best = { name: profile.name, dist };
      }
      if (!best || best.dist > MATCH_THRESHOLD) return null;
      const confidence = Math.max(0, Math.min(100, Math.round((1 - best.dist / MATCH_THRESHOLD) * 100)));
      return { ...best, confidence };
    }

    function speakName(name) {
      const now = Date.now();
      if (lastSpokenName === name && now - lastSpeakTime < 5000) return;
      lastSpokenName = name;
      lastSpeakTime = now;
      const utterance = new SpeechSynthesisUtterance('Das ist ' + name);
      utterance.lang = 'de-DE';
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    async function detectSingleFace() {
      return await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
        .withFaceLandmarks()
        .withFaceDescriptor();
    }

    async function scanPerson() {
      const name = nameInput.value.trim();
      if (!name) {
        setMessage('Bitte zuerst einen Namen eingeben.');
        return;
      }

      scanBtn.disabled = true;
      setMessage('Scan läuft. Bitte ruhig in die Kamera schauen und den Kopf leicht bewegen.');

      const descriptors = [];
      for (let i = 0; i < SCAN_SAMPLES; i++) {
        await new Promise(resolve => setTimeout(resolve, 450));
        const detection = await detectSingleFace();
        if (!detection) {
          setMessage('Gesicht nicht gefunden. Bitte heller oder näher zur Kamera.');
          scanBtn.disabled = false;
          return;
        }
        descriptors.push(detection.descriptor);
        setMessage(`Scan ${i + 1} von ${SCAN_SAMPLES} aufgenommen...`);
      }

      const averaged = averageDescriptors(descriptors);
      const existingIndex = profiles.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
      const profile = { name, descriptor: averaged, samples: SCAN_SAMPLES };

      if (existingIndex >= 0) {
        profiles[existingIndex] = profile;
        setMessage(name + ' wurde aktualisiert.');
      } else {
        profiles.push(profile);
        setMessage(name + ' wurde gespeichert.');
      }

      saveProfiles();
      nameInput.value = '';
      scanBtn.disabled = false;
      newUserDialog.close();
    }

    async function recognitionLoop() {
      if (!running) return;
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      const detection = await detectSingleFace();
      if (detection) {
        const { x, y, width, height } = detection.detection.box;
        const match = findBestMatch(Array.from(detection.descriptor));

        let label = 'Unbekannt';
        let color = '#f59e0b';

        if (match) {
          label = match.name;
          color = '#22c55e';
          recognizedNameEl.textContent = match.name;
          confidenceBadge.textContent = 'Treffer: ' + match.confidence + '%';
          speakName(match.name);
        } else {
          recognizedNameEl.textContent = 'Unbekannt';
          confidenceBadge.textContent = 'Treffer: 0%';
        }

        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = color;
        ctx.font = '20px Arial';
        ctx.fillText(label, x, Math.max(24, y - 10));
      } else {
        recognizedNameEl.textContent = 'Niemand';
        confidenceBadge.textContent = 'Treffer: 0%';
      }

      requestAnimationFrame(recognitionLoop);
    }

    startBtn.addEventListener('click', async () => {
      try {
        startBtn.disabled = true;
        await startCamera();
      } catch (error) {
        console.error(error);
        setMessage('Kamera oder Modelle konnten nicht gestartet werden.');
        startBtn.disabled = false;
      }
    });

    newUserBtn.addEventListener('click', () => {
      newUserDialog.showModal();
      nameInput.focus();
    });

    closeDialogBtn.addEventListener('click', () => {
      newUserDialog.close();
    });

    scanBtn.addEventListener('click', async () => {
      try {
        await scanPerson();
      } catch (error) {
        console.error(error);
        setMessage('Scannen fehlgeschlagen.');
        scanBtn.disabled = false;
      }
    });

    clearBtn.addEventListener('click', () => {
      profiles = [];
      saveProfiles();
      recognizedNameEl.textContent = 'Niemand';
      confidenceBadge.textContent = 'Treffer: 0%';
      setMessage('Alle Nutzer wurden gelöscht.');
    });
  </script>
</body>
</html>
